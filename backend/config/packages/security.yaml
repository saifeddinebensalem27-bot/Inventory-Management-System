security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/ # ✅ take this URLs
            security: false # ✅ when is false, no security is applied to these URLs / when is true, security is applied
        
        # we should be protecting the Data , Logic of application , API, Actions(CRUD, methods)


        # 1. ADD THIS NEW API FIREWALL BLOCK ABOVE 'MAIN'
        api:
            pattern: ^/api
            stateless: true
            # For API, we don't use the custom authenticator for login endpoint
            security: false


        main:
            lazy: true # ✅work when is something about security is needed
            provider: app_user_provider # ✅take the user name and search for the user in the bd
            custom_authenticator: App\Security\AppCustomAuthenticator # ✅the custom authenticator make the permission to login in file AppCustomAuthenticator.php
            logout:
                path: app_logout
                target: app_login # ✅where to redirect after logout

            remember_me:
                secret: '%kernel.secret%'  # ✅encryption key for the cookie
                lifetime: 604800           # ✅how long the cookie is stay working
                path: /
                # by default, the feature is enabled by checking a checkbox in the
                # login form, uncomment the following line to always enable it.
                #always_remember_me: true

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/api, roles: PUBLIC_ACCESS }
        - { path: ^/debug, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
